<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flux-il | מערכת CRM ואוטומציה</title>
    <style>
        :root {
            --primary-color: #005596;
            --secondary-color: #003d6b;
            --bg-color: #f4f7f9;
            --text-color: #333;
            --accent-color: #4fc3f7; /* צבע הדגשה טכנולוגי */
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: var(--text-color);
            overflow: hidden; /* מונע גלילה מיותרת */
            position: relative;
        }

        /* --- אנימציית רקע: קווי קוד זורמים --- */
        body::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                linear-gradient(rgba(0, 85, 150, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 85, 150, 0.05) 1px, transparent 1px);
            background-size: 20px 20px;
            z-index: -2;
        }

        .bg-flow {
            position: absolute;
            top: 0;
            left: 0;
            width: 200%;
            height: 100%;
            background: repeating-linear-gradient(
                90deg,
                transparent,
                transparent 50px,
                rgba(79, 195, 247, 0.1) 50px,
                rgba(79, 195, 247, 0.1) 100px
            );
            z-index: -1;
            animation: moveBg 15s linear infinite;
        }

        @keyframes moveBg {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        .card {
            background: rgba(255, 255, 255, 0.95);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            max-width: 450px;
            width: 90%;
            text-align: center;
            border-top: 5px solid var(--primary-color);
            position: relative;
            z-index: 1;
            backdrop-filter: blur(5px);
        }

        /* --- אנימציית טקסט מקליד --- */
        h1 {
            color: var(--primary-color);
            margin-bottom: 10px;
            font-size: 2.5rem;
            letter-spacing: -1px;
            overflow: hidden; /* מבטיח שהטקסט יופיע רק כשהאנימציה רצה */
            border-right: .15em solid var(--primary-color); /* הסמן המהבהב */
            white-space: nowrap; /* מונע שבירת שורה */
            margin: 0 auto; /* מרכז את הטקסט */
            animation: 
                typing 3s steps(40, end),
                blink-caret .75s step-end infinite;
        }

        @keyframes typing {
            from { width: 0 }
            to { width: 100% }
        }

        @keyframes blink-caret {
            from, to { border-color: transparent }
            50% { border-color: var(--primary-color); }
        }

        p {
            color: #666;
            line-height: 1.6;
            margin-bottom: 25px;
            opacity: 0;
            animation: fadeIn 1s ease-in forwards 3.5s; /* מופיע אחרי הכותרת */
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        /* --- כפתור עם אפקט פולס --- */
        .btn {
            display: inline-block;
            width: 100%;
            padding: 15px;
            background-color: var(--primary-color);
            color: white;
            text-decoration: none;
            border-radius: 10px;
            font-weight: bold;
            font-size: 1.1rem;
            transition: all 0.3s ease;
            box-sizing: border-box;
            position: relative;
            animation: fadeIn 1s ease-in forwards 4s;
            opacity: 0;
        }

        .btn:hover {
            background-color: var(--secondary-color);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .btn::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-radius: 10px;
            box-shadow: 0 0 0 0 rgba(0, 85, 150, 0.7);
            animation: pulse 2s infinite 5s; /* פולס שמתחיל אחרי ההופעה */
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(0, 85, 150, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(0, 85, 150, 0); }
            100% { box-shadow: 0 0 0 0 rgba(0, 85, 150, 0); }
        }

        .status-indicator {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 20px;
            font-size: 0.85rem;
            color: #2e7d32;
            background: #e8f5e9;
            padding: 8px;
            border-radius: 30px;
            opacity: 0;
            animation: fadeIn 1s ease-in forwards 4.5s;
        }

        .dot {
            height: 8px;
            width: 8px;
            background-color: #2e7d32;
            border-radius: 50%;
            display: inline-block;
            animation: blink 1.5s infinite;
        }

        @keyframes blink {
            0% { opacity: 1; }
            50% { opacity: 0.4; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="bg-flow"></div>

    <div class="card">
        <h1>Flux-il</h1>
        <p>מערכת ה-CRM והאוטומציה שלך מוכנה לעבודה. <br> תוכל להתחיל בבדיקת סימולטור הביטוח.</p>
        
        <a href="insurance.html" class="btn">כניסה לביטוח דמה</a>

        <div class="status-indicator">
            <span class="dot"></span>
            חיבור מאובטח HTTPS פעיל
        </div>
    </div>

</body>
</html>
