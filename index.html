<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flux-il | מערכת CRM ואוטומציה</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f9;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }
        .card {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            max-width: 500px;
        }
        h1 { color: #005596; margin-bottom: 10px; }
        p { color: #555; line-height: 1.6; }
        .btn {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 25px;
            background-color: #005596;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            transition: background 0.3s;
            border: none;
            cursor: pointer;
        }
        .btn:hover {
            background-color: #003d6b;
        }
        .status-badge {
            display: inline-block;
            padding: 5px 12px;
            background: #e8f5e9;
            color: #2e7d32;
            border-radius: 20px;
            font-size: 0.9em;
            margin-top: 15px;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>Flux-il</h1>
        <p>ברוכים הבאים למערכת האוטומציה וה-CRM המתקדמת בישראל. <br>האתר כרגע בבנייה והתאמה אישית.</p>
        
        <div class="status-badge">● מערכת מאובטחת HTTPS</div>
        
        <br><br>
        
        <a href="insurance.htm" class="btn">כניסה לביטוח דמה</a>
    </div>

</body>
</html>
