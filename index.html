<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flux-il | מערכת CRM ואוטומציה</title>
    <style>
        :root {
            --primary-color: #005596;
            --secondary-color: #003d6b;
            --bg-color: #f4f7f9;
            --text-color: #333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: var(--text-color);
        }

        .card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            max-width: 450px;
            width: 90%;
            text-align: center;
            border-top: 5px solid var(--primary-color);
        }

        h1 {
            color: var(--primary-color);
            margin-bottom: 10px;
            font-size: 2.5rem;
            letter-spacing: -1px;
        }

        p {
            color: #666;
            line-height: 1.6;
            margin-bottom: 25px;
        }

        .btn {
            display: inline-block;
            width: 100%;
            padding: 15px;
            background-color: var(--primary-color);
            color: white;
            text-decoration: none;
            border-radius: 10px;
            font-weight: bold;
            font-size: 1.1rem;
            transition: all 0.3s ease;
            box-sizing: border-box;
        }

        .btn:hover {
            background-color: var(--secondary-color);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .status-indicator {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 20px;
            font-size: 0.85rem;
            color: #2e7d32;
            background: #e8f5e9;
            padding: 8px;
            border-radius: 30px;
        }

        .dot {
            height: 8px;
            width: 8px;
            background-color: #2e7d32;
            border-radius: 50%;
            display: inline-block;
            animation: blink 1.5s infinite;
        }

        @keyframes blink {
            0% { opacity: 1; }
            50% { opacity: 0.4; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>Flux-il</h1>
        <p>מערכת ה-CRM והאוטומציה שלך בבניה. <br> בנתיים תוכל להתחיל בבדיקת סימולטור הביטוח.</p>
        
        <a href="insurance.html" class="btn">כניסה לביטוח דמה</a>

        <div class="status-indicator">
            <span class="dot"></span>
            חיבור מאובטח HTTPS פעיל
        </div>
    </div>

</body>
</html>
